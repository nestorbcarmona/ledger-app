services:
  redis:
    image: redis:7-alpine
    ports:
      - '6379:6379'
    command: ['redis-server', '--appendonly', 'yes']

  jaeger:
    image: jaegertracing/all-in-one:1.64
    ports:
      - '16686:16686' # UI — open in browser
      - '4318:4318' # OTLP HTTP (app sends traces here)
    environment:
      COLLECTOR_OTLP_ENABLED: 'true'
